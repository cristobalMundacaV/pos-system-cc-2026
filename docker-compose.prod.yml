services:
  postgres:
    image: postgres:14-alpine
    container_name: pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pos_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: pos-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pos_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SSL: "false"
      DB_POOL_MAX: 10
      DB_IDLE_TIMEOUT: 30000
      DB_CONNECTION_TIMEOUT: 2000

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 8h

      FRONTEND_URL: https://pos.mundacasolutions.com

      STORAGE_DRIVER: local
      UPLOAD_MAX_SIZE_MB: 5
      STORAGE_PUBLIC_URL:

      LOG_LEVEL: info

      NODE_PATH: /app/backend/node_modules
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - backend_uploads:/app/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    container_name: pos-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://pos.mundacasolutions.com
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads: