services:
  postgres:
    image: postgres:14-alpine
    container_name: pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pos_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: pos-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pos_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSL: "false"
      DB_POOL_MAX: 10
      DB_IDLE_TIMEOUT: 30000
      DB_CONNECTION_TIMEOUT: 2000

      JWT_SECRET: mundaca_pos_secret_docker_2026_super_seguro
      JWT_EXPIRES_IN: 8h

      FRONTEND_URL: http://localhost:3000

      STORAGE_DRIVER: local
      UPLOAD_MAX_SIZE_MB: 5
      STORAGE_PUBLIC_URL:

      LOG_LEVEL: info

      NODE_PATH: /app/backend/node_modules
    ports:
      - "3001:3001"
    volumes:
      - backend_uploads:/app/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    container_name: pos-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_uploads: